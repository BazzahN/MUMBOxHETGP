problem:
  k: 10                     # Number of unique design points
  n: 5                      # Replicates per point
  x_min: 0.0
  x_max: 1.0
  test_function_index: 1    # 0/1: Sine, 2: Bump, 3: Cosine
  noise_function_index: 0   # 0: Linear, 1: Sine, 2: Peak
  phi: 0.6                  # Noise parameter (base level)
  tau: 0.7                  # Noise parameter (scale)
  seed: 12345

misc:
  n_grid: 200               # Test grid resolution

hetgp:
  covtype: "Matern5_2"      # Covariance type: Gaussian, Matern5_2, Matern3_2
  maxit: 100                # Max optimization iterations for MLE
  standardise: true         # Standardize outputs before fitting
